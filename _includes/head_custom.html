<!-- Dark Mode Toggle Button -->
<button id="darkModeToggle" class="dark-mode-toggle" aria-label="Toggle dark mode">
  <span id="darkModeIcon">🌞</span> <span id="darkModeText">Light Mode</span>
</button>

<script>
  // Dark mode toggle functionality
  (function() {
    const DEFAULT_THEME = 'dark';
    const toggle = document.getElementById('darkModeToggle');
    const icon = document.getElementById('darkModeIcon');
    const text = document.getElementById('darkModeText');
    
    // Update button UI and aria-label
    function updateButton(isDark) {
      if (isDark) {
        icon.textContent = '🌙';
        text.textContent = 'Dark Mode';
        toggle.setAttribute('aria-label', 'Switch to light mode');
      } else {
        icon.textContent = '🌞';
        text.textContent = 'Light Mode';
        toggle.setAttribute('aria-label', 'Switch to dark mode');
      }
    }
    
    // Check for saved user preference, default to dark mode
    const currentTheme = localStorage.getItem('theme') || DEFAULT_THEME;
    
    // Apply the theme
    if (currentTheme === 'dark') {
      document.body.classList.add('dark-mode');
      updateButton(true);
    } else {
      document.body.classList.remove('dark-mode');
      updateButton(false);
    }
    
    // Toggle dark mode on button click
    toggle.addEventListener('click', function() {
      document.body.classList.toggle('dark-mode');
      
      const isDark = document.body.classList.contains('dark-mode');
      const theme = isDark ? 'dark' : 'light';
      
      updateButton(isDark);
      localStorage.setItem('theme', theme);
    });
  })();
</script>
