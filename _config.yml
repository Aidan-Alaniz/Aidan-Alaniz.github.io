remote_theme: dieghernan/chulapa
repository: Aidan-Alaniz/Aidan-Alaniz.github.io

title: Aidan Alaniz
title_separator: " | "
subtitle: "Student @ ASCTE"
description: >-
  Portfolio of Aidan Alaniz — student, athlete, and maker at ASCTE.
email: aidandalaniz@gmail.com
github_username: Aidan-Alaniz
url: "https://Aidan-Alaniz.github.io"

locale: en-US
timezone: America/Chicago

# Chulapa skin — Wandoo with dark mode overrides
chulapa-skin:
  skin: wandoo
  vars:
    body-bg: "#141f25"
    body-color: "#d8e4ea"
    light: "#1c2d36"
    dark: "#0f1c22"
    card-bg: "#1c2d36"
    border-color: "#2a3a44"

author:
  name: "Aidan Alaniz"
  avatar: "/assets/images/bio-photo.jpg"
  bio: "Junior at ASCTE. Athlete, maker, and aspiring physical therapist."
  location: "Huntsville, AL"
  links:
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:aidandalaniz@gmail.com"
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/aidan-alaniz/"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/Aidan-Alaniz"

# Navigation
navbar:
  style: "dark"
  nav:
    - title: "Home"
      url: "/"
    - title: "About"
      child:
        - title: "About Me"
          url: "/about/"
        - title: "Certifications"
          url: "/certifications/"
    - title: "Projects"
      url: "/projects/"
    - title: "Resume"
      child:
        - title: "Academic"
          url: "/academic-resume/"
        - title: "Athletic"
          url: "/athletic-resume/"

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-remote-theme

# Build settings
markdown: kramdown
kramdown:
  auto_ids: false
permalink: /:categories/:title/

include:
  - _pages

collections:
  projects:
    output: true
    permalink: /projects/:path/

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      author_profile: true
      header_type: "base"
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: "default"
      author_profile: true
  - scope:
      path: ""
      type: projects
    values:
      layout: "default"
      author_profile: true
      header_type: "base"
      back_to_projects: true
